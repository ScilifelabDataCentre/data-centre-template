# Spell checking using CSpell (cspell-action)
# Link: https://github.com/marketplace/actions/cspell-action
#
# See .config/cspell/ for information about
# this workflow and the CSpell configuration
---
name: Spell Check with CSpell

on:
  pull_request: # Trigger when PR is opened or updated

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo to access the files for spell checking
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false # We don't need the token in subsequent steps

      # Some dictionaries require installation here
      # and import in the .config/cspell/cspell-config.yml file
      - name: Install CSpell Dictionaries (Swedish and names)
        run: npm install --no-save @cspell/dict-sv @cspell/dict-people-names

      - name: Run CSpell
        uses: streetsidesoftware/cspell-action@v8
        with: # See link at top of file for more configuration options
          files: '' # Include all file types (default)
          incremental_files_only: true # Only spell check PR diff (default)
          config: '.config/cspell/cspell-config.yml' # Custom CSpell config file
          inline: error # Show spelling issues as inline errors in PR
          suggestions: true # Show suggestions for misspelled words
          strict: true # Fail action if misspelled words are found (default)
