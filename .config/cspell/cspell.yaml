---
version: "0.2"

# Languages used for spell checking.
language: en-gb,sv

# Extra dictionaries that are not bundled by the action.
import:
  - "@cspell/dict-sv/cspell-ext.json"
  - "@cspell/dict-people-names/cspell-ext.json"

caseSensitive: true

ignorePaths:
  - ./cspell.json

ignoreRegExpList:
  - MarkdownLink
  - Url
  - /\b[a-z0-9]+(?:-[a-z0-9]+)*\.[a-z]{2,}\b/gi
  - /#datacentre_[a-z0-9_-]+/g

dictionaryDefinitions:
  - name: project-specific-words
    path: ./project-specific-words.txt
    addWords: true

dictionaries:
  - companies
  - cpp-compound-words
  - fonts
  - fullstack
  - k8s
  - latex
  - project-specific-words
  - ruby
  - sql